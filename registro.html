<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crear Cuenta - TechStore</title>
    <link rel="stylesheet" href="./CSS/styles.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>

    <div class="register-card">
        <div class="icon-container">
            <i data-lucide="user-plus"></i>
        </div>

        <h1>Crear Cuenta</h1>
        <p class="subtitle">Únete a TechStore hoy</p>

        <form>
            <div class="input-group">
                <label for="fullname">Nombre completo</label>
                <input type="text" id="fullname" placeholder="Tu nombre">
            </div>

            <div class="input-group">
                <label for="email">Email</label>
                <input type="email" id="email" placeholder="tu@email.com">
            </div>

            <div class="input-group">
                <label for="password">Contraseña</label>
                <input type="password" id="password" placeholder="Mínimo 6 caracteres">
            </div>

            <button type="submit" class="btn-submit">Crear Cuenta</button>
        </form>

        <p class="footer-text">
            ¿Ya tienes cuenta? <a href="#">Inicia sesión</a>
        </p>
    </div>

    <script>
        // Inicializar los iconos
        lucide.createIcons();
    </script>
</body>
</html>
